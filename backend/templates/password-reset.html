<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Reset Your Password</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;">
  <div style="max-width:600px;margin:auto;background:#fff;border-radius:8px;padding:32px;">
    <h2 style="color:#2d6a4f;">GoodWill TMS — Password Reset</h2>
    <p>Hi {{name}},</p>
    <p>We received a request to reset your password. Click the button below to set a new password. This link expires in 1 hour.</p>
    <p style="text-align:center;margin:32px 0;">
      <a href="{{reset_link}}" style="background:#2d6a4f;color:#fff;padding:12px 24px;border-radius:4px;text-decoration:none;font-weight:bold;">Reset Password</a>
    </p>
    <p>If you did not request a password reset, you can safely ignore this email.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
    <p style="font-size:12px;color:#888;">GoodWill Transport Management System</p>
  </div>
</body>
</html>
