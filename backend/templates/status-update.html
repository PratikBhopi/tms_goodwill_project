<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Order Status Update</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;">
  <div style="max-width:600px;margin:auto;background:#fff;border-radius:8px;padding:32px;">
    <h2 style="color:#2d6a4f;">GoodWill TMS — Order Status Update</h2>
    <p>Hi {{name}},</p>
    <p>Your order status has been updated. Here are the details:</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0;">
      <tr><td style="padding:8px;border:1px solid #eee;font-weight:bold;">Order ID</td><td style="padding:8px;border:1px solid #eee;">{{order_id}}</td></tr>
      <tr><td style="padding:8px;border:1px solid #eee;font-weight:bold;">New Status</td><td style="padding:8px;border:1px solid #eee;">{{status}}</td></tr>
    </table>
    <p>Log in to the portal to view full order details.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
    <p style="font-size:12px;color:#888;">GoodWill Transport Management System</p>
  </div>
</body>
</html>
